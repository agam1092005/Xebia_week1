services:
  # Backend - Blue
  backend-blue:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - PORT=8080
      - DEPLOYMENT=blue
    networks:
      - task-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "deployment=blue"
      - "service=backend"

  # Backend - Green
  backend-green:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - PORT=8080
      - DEPLOYMENT=green
    networks:
      - task-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "deployment=green"
      - "service=backend"

  # Frontend - Blue
  frontend-blue:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - NEXT_PUBLIC_API_URL=http://backend-lb:8080
      - DEPLOYMENT=blue
    networks:
      - task-network
    depends_on:
      backend-blue:
        condition: service_healthy
    labels:
      - "deployment=blue"
      - "service=frontend"

  # Frontend - Green
  frontend-green:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - NEXT_PUBLIC_API_URL=http://backend-lb:8080
      - DEPLOYMENT=green
    networks:
      - task-network
    depends_on:
      backend-green:
        condition: service_healthy
    labels:
      - "deployment=green"
      - "service=frontend"

  # Backend Load Balancer
  backend-lb:
    image: nginx:alpine
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/backend-lb.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend-blue
      - backend-green
    networks:
      - task-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Frontend Load Balancer
  frontend-lb:
    image: nginx:alpine
    ports:
      - "3000:3000"
    volumes:
      - ./nginx/frontend-lb.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend-blue
      - frontend-green
    networks:
      - task-network

networks:
  task-network:
    driver: bridge
